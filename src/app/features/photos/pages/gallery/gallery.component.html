<div class="page-header">
  <h1>Photo Gallery</h1>
  <p class="subtitle">Discover and save beautiful photos</p>
</div>

<div class="photo-grid" role="list" aria-label="Photo gallery">
  @for (photo of photosStore.photos(); track photo.id) {
    <div role="listitem">
      <app-photo-card
        [photo]="photo"
        [isFavorite]="isFavorite(photo.id)"
        (clicked)="onPhotoClicked($event)"
        (toggledFavorite)="onFavoriteToggled($event)"
      />
    </div>
  }
</div>

@if (photosStore.loading()) {
  <app-loader />
}

@if (photosStore.isEmpty()) {
  <div class="empty-state">
    <p>Loading your photos...</p>
  </div>
}

<!-- Sentinel: invisible element observed by IntersectionObserver.
     When it scrolls into view (or within 200px), the next page loads. -->
<div #sentinel class="sentinel" aria-hidden="true"></div>
